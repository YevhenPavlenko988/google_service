spring:
  application:
    name: google-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:google_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-32ch}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8081/google/auth/callback}
    calendar-redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8081/google/calendar/callback}
    auth-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
    calendar-base-url: https://www.googleapis.com/calendar/v3

  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
