name: Deploy google-service to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/verbly/google_service
            git fetch origin main && git reset --hard origin/main
            docker compose -f /opt/verbly/auth_service/deploy/docker-compose.prod.yml build google-service
            docker compose -f /opt/verbly/auth_service/deploy/docker-compose.prod.yml up -d --force-recreate google-service
            echo "✅ google-service deployed at $(date)"
